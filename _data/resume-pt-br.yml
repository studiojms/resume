summary: |-
  <p>Engenheiro de Software Sênior com mais de 20 anos de experiência na construção de sistemas escaláveis e de alto desempenho em ambientes backend e fullstack. Forte expertise em arquitetura nativa da nuvem (AWS, Kubernetes), microsserviços e sistemas orientados a eventos.</p>
  <p>Histórico comprovado na entrega de sistemas em larga escala, incluindo plataformas de dados que suportam mais de 500 milhões de registros e migrações de frontend com mais de 2.500 componentes. Experiência em otimização de desempenho, redução de latência e design de sistemas distribuídos resilientes.</p>
  <p>Proficiência avançada em TypeScript (Node.js), Java e Python, com experiência prática em frameworks modernos de frontend (React, Next.js). Recentemente focado em fluxos de trabalho de desenvolvimento aumentados por IA e melhorias de produtividade para desenvolvedores.</p>
