<!-- Language Switcher - Hidden from PDF exports -->
{% if site.data.languages.available.size > 1 %}
<div class="language-switcher no-print">
  <span class="lang-label">🌐</span>
  {% for lang in site.data.languages.available %} {% if lang.code == page.lang %}
  <span class="lang-current">{{ lang.name }}</span>
  {% elsif lang.code == 'en' %}
  <a href="/" class="lang-link">{{ lang.name }}</a>
  {% else %}
  <a href="/pt-br" class="lang-link">{{ lang.name }}</a>
  {% endif %} {% unless forloop.last %}<span class="lang-separator">|</span>{% endunless %} {% endfor %}
</div>
{% endif %}
